<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#E5E5EA"/>
  <!-- Left column: 2 cards -->
  <rect x="4" y="5"  width="8" height="9"  rx="1.5" fill="white" fill-opacity="0.75" stroke="white" stroke-opacity="0.4" stroke-width="0.5"/>
  <rect x="4" y="16" width="8" height="11" rx="1.5" fill="white" fill-opacity="0.75" stroke="white" stroke-opacity="0.4" stroke-width="0.5"/>
  <!-- Middle column: 3 cards -->
  <rect x="13" y="5"  width="8" height="6"  rx="1.5" fill="white" fill-opacity="0.75" stroke="white" stroke-opacity="0.4" stroke-width="0.5"/>
  <rect x="13" y="13" width="8" height="6"  rx="1.5" fill="white" fill-opacity="0.75" stroke="white" stroke-opacity="0.4" stroke-width="0.5"/>
  <rect x="13" y="21" width="8" height="6"  rx="1.5" fill="white" fill-opacity="0.75" stroke="white" stroke-opacity="0.4" stroke-width="0.5"/>
  <!-- Right column: 1 card -->
  <rect x="22" y="5"  width="6" height="22" rx="1.5" fill="white" fill-opacity="0.75" stroke="white" stroke-opacity="0.4" stroke-width="0.5"/>
